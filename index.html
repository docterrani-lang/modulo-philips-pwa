<script>
  // ----------------- Script principale (tabelle, PDF/mail, firme corrette) -----------------
  const state = {
    attivita: [],
    partecipanti: []
  };

  const $ = (id) => document.getElementById(id);

  function toast(message) {
    const el = $("toast");
    el.textContent = message;
    el.style.display = "block";
    window.setTimeout(() => {
      el.style.display = "none";
    }, 2600);
  }

  function value(id) {
    return ($(id).value || "").trim();
  }

  function esc(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatDate(inputValue) {
    if (!inputValue) return "";
    const parts = inputValue.split("-");
    if (parts.length !== 3) return inputValue;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }

  function cleanFilePart(text, fallback) {
    const cleaned = String(text || fallback)
      .trim()
      .replace(/[<>:"/\\|?*]+/g, "-")
      .replace(/\s+/g, "_");
    return cleaned || fallback;
  }

  function fileName() {
    const today = new Date().toISOString().slice(0, 10);
    const specialist = cleanFilePart(value("istruttore"), "Application_Specialist");
    const project = cleanFilePart(value("project"), "Project");
    return `${specialist}_${project}_${today}.pdf`;
  }

  function subject() {
    const specialist = value("istruttore") || "Application Specialist non indicato";
    const serial = value("serial") || "Serial Number non indicato";
    return `Rapporto Formazione Philips - ${specialist} - SN ${serial}`;
  }

  function refreshTables() {
    $("attivitaBody").innerHTML = state.attivita.map((row) => `
      <tr>
        <td>${esc(row.tipo)}</td>
        <td>${esc(row.inizio)}</td>
        <td>${esc(row.fine)}</td>
      </tr>
    `).join("");

    $("partecipantiBody").innerHTML = state.partecipanti.map((row) => `
      <tr>
        <td>${esc(row.nome)}</td>
        <td>${esc(row.qualifica)}</td>
        <td>${esc(row.data)}</td>
      </tr>
    `).join("");

    $("nomeFile").textContent = `Nome PDF: ${fileName()}`;
  }

  function setActiveTab(tabId) {
    const target = $(tabId);
    if (!target) return;

    document.querySelectorAll("nav button").forEach((button) => {
      const isActive = button.dataset.tab === tabId;
      button.classList.toggle("active", isActive);
      button.setAttribute("aria-pressed", isActive ? "true" : "false");
    });

    document.querySelectorAll("main section").forEach((section) => {
      section.classList.toggle("active", section.id === tabId);
    });
  }

  document.querySelector("nav").addEventListener("click", (event) => {
    const button = event.target.closest("button[data-tab]");
    if (!button) return;
    setActiveTab(button.dataset.tab);
  });

  $("addAttivita").addEventListener("click", () => {
    const data = formatDate(value("dataAttivita"));
    if (!data) {
      toast("Seleziona la data dell'attivita.");
      return;
    }
    state.attivita.push({
      tipo: value("tipoAttivita"),
      inizio: `${data} ${value("oraInizio")}`,
      fine: `${data} ${value("oraFine")}`
    });
    $("dataAttivita").value = "";
    refreshTables();
  });

  $("clearAttivita").addEventListener("click", () => {
    state.attivita = [];
    refreshTables();
  });

  $("addPartecipante").addEventListener("click", () => {
    const nome = value("nomePartecipante").toUpperCase();
    if (!nome) {
      toast("Inserisci il nome del partecipante.");
      return;
    }
    state.partecipanti.push({
      nome,
      qualifica: value("qualifica"),
      data: formatDate(value("dataPartecipante"))
    });
    $("nomePartecipante").value = "";
    $("qualifica").value = "";
    $("dataPartecipante").value = "";
    refreshTables();
  });

  $("clearPartecipanti").addEventListener("click", () => {
    state.partecipanti = [];
    refreshTables();
  });

  // ----------------- Signature handling (DPI-aware, pointer events, clear, export) -----------------
  (function() {
    const canvasIds = ['firmaIstruttore', 'firmaCliente'];
    const TRANSPARENT_PNG = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVQIW2NgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=';

    function createEmptyImageDataURL(width, height) {
      const tmp = document.createElement('canvas');
      tmp.width = Math.max(1, Math.floor(width));
      tmp.height = Math.max(1, Math.floor(height));
      const tctx = tmp.getContext('2d');
      tctx.fillStyle = '#ffffff';
      tctx.fillRect(0, 0, tmp.width, tmp.height);
      return tmp.toDataURL('image/png');
    }

    function setupSingleCanvas(id) {
      const canvas = document.getElementById(id);
      if (!canvas) return null;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      let drawing = false;
      let last = null;

      function resizeAndRestore() {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;

        // snapshot previous content
        let prevData = null;
        try { prevData = canvas.toDataURL(); } catch (e) { prevData = null; }

        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

        // background white
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, rect.width, rect.height);

        // restore if possible
        if (prevData && prevData.length > 100) {
          const img = new Image();
          img.onload = () => {
            try { ctx.drawImage(img, 0, 0, rect.width, rect.height); } catch(e) {}
          };
          img.src = prevData;
        }

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
      }

      function pointerPos(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left),
          y: (event.clientY - rect.top)
        };
      }

      canvas.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        drawing = true;
        last = pointerPos(ev);
        try { canvas.setPointerCapture(ev.pointerId); } catch(e){}
      }, { passive: false });

      canvas.addEventListener('pointermove', (ev) => {
        if (!drawing || !last) return;
        ev.preventDefault();
        const p = pointerPos(ev);
        ctx.beginPath();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        last = p;
      }, { passive: false });

      const endPointer = (ev) => {
        if (!drawing) return;
        drawing = false;
        last = null;
        try { canvas.releasePointerCapture && canvas.releasePointerCapture(ev && ev.pointerId); } catch(e){}
      };

      canvas.addEventListener('pointerup', endPointer, { passive: false });
      canvas.addEventListener('pointercancel', endPointer, { passive: false });

      window.addEventListener('resize', resizeAndRestore);
      resizeAndRestore();

      // clear button
      const clearBtn = document.querySelector(`button[data-clear="${id}"]`);
      if (clearBtn) {
        clearBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          ctx.clearRect(0, 0, rect.width, rect.height);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, rect.width, rect.height);
        });
      }

      // helper isEmpty
      canvas.isEmpty = function() {
        try {
          const rect = canvas.getBoundingClientRect();
          const data = canvas.toDataURL();
          const comparison = createEmptyImageDataURL(rect.width, rect.height);
          return data === comparison;
        } catch (e) {
          return false;
        }
      };

      return canvas;
    }

    canvasIds.forEach(setupSingleCanvas);

    window.getSignatureDataUrl = function(id) {
      const c = document.getElementById(id);
      if (!c) return TRANSPARENT_PNG;
      try {
        const rect = c.getBoundingClientRect();
        if (typeof c.isEmpty === 'function' && c.isEmpty()) {
          return createEmptyImageDataURL(rect.width || 190, rect.height || 76);
        }
        const tmp = document.createElement('canvas');
        tmp.width = Math.max(1, Math.floor(rect.width));
        tmp.height = Math.max(1, Math.floor(rect.height));
        const tctx = tmp.getContext('2d');
        tctx.fillStyle = '#ffffff';
        tctx.fillRect(0, 0, tmp.width, tmp.height);
        tctx.drawImage(c, 0, 0, tmp.width, tmp.height);
        return tmp.toDataURL('image/png');
      } catch (err) {
        return TRANSPARENT_PNG;
      }
    };

    // compatibility: your buildPrint uses signatureImage()
    window.signatureImage = function(id) {
      return window.getSignatureDataUrl(id) || TRANSPARENT_PNG;
    };
  })();

  // ----------------- Build print area (unchanged, uses signatureImage) -----------------
  function buildPrint() {
    const checks = [
      [$("chk1").checked, "Consegnato Programma di Formazione"],
      [$("chk2").checked, "Illustrata la documentazione d'Uso del sistema"],
      [$("chk3").checked, "Eseguita formazione specifica alle tematiche di Sicurezza"]
    ];

    $("printArea").innerHTML = `
      <div class="print-title">PHILIPS</div>
      <div class="print-heading">RAPPORTO INTERVENTO / FORMAZIONE APPLICATIVA</div>
      <div class="print-grid">
        <div class="print-cell"><div class="print-label">CLIENTE / REPARTO</div>${esc(value("cliente"))}</div>
        <div class="print-cell"><div class="print-label">PROJECT N.</div>${esc(value("project"))}</div>
        <div class="print-cell"><div class="print-label">SISTEMA / MODELLO</div>${esc(value("sistema"))}</div>
        <div class="print-cell"><div class="print-label">TECH ID / SERIAL NUMBER</div>${esc(value("serial"))}</div>
      </div>

      <div class="print-heading">DETTAGLI ATTIVITA DI TRAINING GIORNALIERE</div>
      <table class="print-table">
        <thead><tr><th>Descrizione Attivita</th><th>Data/Ora Inizio</th><th>Data/Ora Fine</th></tr></thead>
        <tbody>${state.attivita.map((row) => `<tr><td>${esc(row.tipo)}</td><td>${esc(row.inizio)}</td><td>${esc(row.fine)}</td></tr>`).join("")}</tbody>
      </table>

      <div class="print-heading">NOTE / DESCRIZIONE DELLE ATTIVITA</div>
      <div class="print-cell" style="border:1px solid #000; min-height:70px">${esc(value("note")).replace(/\n/g, "<br>")}</div>

      <div style="margin-top:10px">${checks.map(([ok, text]) => `<div>[${ok ? "X" : " "}] ${esc(text)}</div>`).join("")}</div>

      <div class="print-heading">ELENCO PARTECIPANTI E SOTTOSCRIZIONE</div>
      <table class="print-table">
        <thead><tr><th>NOME COGNOME</th><th>QUALIFICA</th><th>DATA</th></tr></thead>
        <tbody>${state.partecipanti.map((row) => `<tr><td>${esc(row.nome)}</td><td>${esc(row.qualifica)}</td><td>${esc(row.data)}</td></tr>`).join("")}</tbody>
      </table>

      <div class="print-signatures">
        <div class="print-signature">
          <div class="print-label">CLINICAL APPLICATION SPECIALIST</div>
          <div>${esc(value("istruttore"))}</div>
          <img src="${signatureImage("firmaIstruttore")}" alt="">
        </div>
        <div class="print-signature">
          <div class="print-label">FIRMA PER ACCETTAZIONE CLIENTE</div>
          <div>${esc(value("respCliente"))}</div>
          <img src="${signatureImage("firmaCliente")}" alt="">
        </div>
      </div>
    `;
  }

  // genera PDF -> qui usi window.print() come prima (stampa verso PDF)
  $("generaPdf").addEventListener("click", () => {
    $("nomeFile").textContent = `Nome PDF: ${fileName()}`;
    buildPrint();
    window.print();
  });

  // prepara mail (senza allegato, come nel tuo originale)
  $("preparaEmail").addEventListener("click", () => {
    const body = "Buongiorno,%0D%0A%0D%0Ain allegato si trasmette il Rapporto di Formazione in formato PDF.%0D%0A%0D%0ACordiali saluti.";
    const url = `mailto:${encodeURIComponent(value("mailA"))}?subject=${encodeURIComponent(subject())}&body=${body}`;
    window.location.href = url;
  });

  // Aggiorna anteprima nome file quando cambiano i campi
  ["istruttore", "project"].forEach((id) => {
    $(id).addEventListener("input", refreshTables);
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }

  refreshTables();
</script>
