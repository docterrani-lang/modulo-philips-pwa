<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b5ede">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Modulo Philips">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Modulo Philips">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <title>Modulo Philips APP</title>
  <style>
    :root {
      --blue: #0b5ede;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #f4f7fb;
      --white: #ffffff;
      --ok: #087443;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.35;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand strong {
      color: var(--blue);
      font-size: 20px;
      letter-spacing: 1px;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 12px;
    }

    nav button,
    .actions button,
    .inline button,
    .danger-button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    nav button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    h1,
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      padding: 9px 10px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: end;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .actions .primary {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    .actions .success {
      background: var(--ok);
      border-color: var(--ok);
      color: var(--white);
    }

    .danger-button {
      color: var(--danger);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: var(--white);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .checks {
      display: grid;
      gap: 8px;
    }

    .check-row {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--ink);
    }

    .check-row input {
      width: 20px;
      min-height: 20px;
    }

    .signature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    canvas {
      width: 100%;
      height: 150px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      touch-action: none;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    #toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 50;
      display: none;
      border-radius: 8px;
      background: #172033;
      color: white;
      padding: 12px;
      text-align: center;
    }

    #printArea {
      display: none;
    }

    @media (max-width: 720px) {
      .grid,
      .inline,
      .signature-grid,
      .actions {
        grid-template-columns: 1fr;
      }

      nav button {
        font-size: 13px;
        padding: 6px;
      }

      main {
        padding: 10px;
      }
    }

    @media print {
      body > header,
      body > main,
      #toast {
        display: none !important;
      }

      #printArea {
        display: block;
        color: #000;
        font-family: Arial, Helvetica, sans-serif;
      }

      @page {
        size: A4;
        margin: 12mm;
      }

      .print-title {
        color: #0b5ede;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 14px;
      }

      .print-heading {
        font-size: 16px;
        font-weight: 700;
        margin: 14px 0 8px;
      }

      .print-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 1px solid #000;
        border-bottom: 0;
      }

      .print-cell {
        border-right: 1px solid #000;
        border-bottom: 1px solid #000;
        padding: 7px;
        min-height: 34px;
      }

      .print-cell:nth-child(2n) {
        border-right: 0;
      }

      .print-label {
        color: #555;
        font-size: 10px;
        font-weight: 700;
        margin-bottom: 3px;
      }

      .print-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
      }

      .print-table th,
      .print-table td {
        border: 1px solid #000;
        padding: 6px;
        font-size: 11px;
      }

      .print-signatures {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        margin-top: 24px;
      }

      .print-signature img {
        width: 190px;
        height: 76px;
        object-fit: contain;
        border-bottom: 1px solid #000;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <strong>PHILIPS</strong>
      <span>Rapporto formazione applicativa</span>
    </div>
    <nav aria-label="Sezioni modulo">
      <button type="button" class="active" data-tab="dati" aria-pressed="true">Dati</button>
      <button type="button" data-tab="partecipanti" aria-pressed="false">Partecipanti</button>
      <button type="button" data-tab="firme" aria-pressed="false">Firme e invio</button>
    </nav>
  </header>

  <main>
    <section id="dati" class="active">
      <div class="panel">
        <h1>Dati e attivita</h1>
        <div class="grid">
          <div>
            <label for="cliente">Cliente / Reparto</label>
            <input id="cliente" autocomplete="organization">
          </div>
          <div>
            <label for="project">Project N.</label>
            <input id="project">
          </div>
          <div>
            <label for="sistema">Sistema / Modello</label>
            <input id="sistema">
          </div>
          <div>
            <label for="serial">Serial Number</label>
            <input id="serial">
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Attivita giornaliere</h2>
        <div class="grid">
          <div>
            <label for="tipoAttivita">Attivita</label>
            <select id="tipoAttivita">
              <option>Training Applicativo</option>
              <option>Clinical Application</option>
              <option>Follow-up Training</option>
              <option>Handover / Affiancamento</option>
            </select>
          </div>
          <div>
            <label for="dataAttivita">Data</label>
            <input id="dataAttivita" type="date">
          </div>
          <div>
            <label for="oraInizio">Ora inizio</label>
            <input id="oraInizio" type="time" value="08:00">
          </div>
          <div>
            <label for="oraFine">Ora fine</label>
            <input id="oraFine" type="time" value="16:00">
          </div>
        </div>
        <div class="actions">
          <button type="button" class="primary" id="addAttivita">Aggiungi giorno</button>
          <button type="button" class="danger-button" id="clearAttivita">Svuota elenco</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Inizio</th>
              <th>Fine</th>
            </tr>
          </thead>
          <tbody id="attivitaBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <label for="note">Note / Descrizione dell'attivita</label>
        <textarea id="note"></textarea>
        <div class="checks">
          <label class="check-row"><input id="chk1" type="checkbox"> Consegnato Programma di Formazione</label>
          <label class="check-row"><input id="chk2" type="checkbox"> Illustrata la documentazione d'Uso</label>
          <label class="check-row"><input id="chk3" type="checkbox"> Eseguita formazione specifica sulla Sicurezza</label>
        </div>
      </div>
    </section>

    <section id="partecipanti">
      <div class="panel">
        <h1>Elenco partecipanti</h1>
        <div class="grid">
          <div>
            <label for="nomePartecipante">Nome Cognome</label>
            <input id="nomePartecipante" autocomplete="name">
          </div>
          <div>
            <label for="qualifica">Qualifica</label>
            <select id="qualifica">
              <option value=""></option>
              <option>TSRM</option>
              <option>DOTT</option>
              <option>ING</option>
              <option>FISICO</option>
              <option>INF</option>
            </select>
          </div>
          <div>
            <label for="dataPartecipante">Data</label>
            <input id="dataPartecipante" type="date">
          </div>
        </div>
        <div class="actions">
          <button type="button" class="primary" id="addPartecipante">Aggiungi partecipante</button>
          <button type="button" class="danger-button" id="clearPartecipanti">Svuota elenco</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nome Cognome</th>
              <th>Qualifica</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="partecipantiBody"></tbody>
        </table>
      </div>
    </section>

    <section id="firme">
      <div class="panel">
        <h1>Firme</h1>
        <div class="grid">
          <div>
            <label for="istruttore">Application Specialist</label>
            <input id="istruttore">
          </div>
          <div>
            <label for="respCliente">Resp. Cliente</label>
            <input id="respCliente">
          </div>
        </div>
        <div class="signature-grid" style="margin-top:12px">
          <div>
            <label>Firma Specialist / Instructor</label>
            <canvas id="firmaIstruttore"></canvas>
            <button type="button" class="danger-button" data-clear="firmaIstruttore">Cancella</button>
          </div>
          <div>
            <label>Firma accettazione cliente</label>
            <canvas id="firmaCliente"></canvas>
            <button type="button" class="danger-button" data-clear="firmaCliente">Cancella</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Invio email</h2>
        <div class="grid">
          <div>
            <label for="mailA">A</label>
            <select id="mailA">
              <option>paola.bessi@philips.com</option>
            </select>
          </div>
          <div>
            <label for="mailDa">Mittente Philips</label>
            <select id="mailDa">
              <option>simone.terrani@philips.com</option>
              <option>alfredo.sanguinetti@philips.com</option>
              <option>bruna.centola@philips.com</option>
              <option>luca.colombo@philips.com</option>
              <option>catello.d'arco@philips.com</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="success" id="generaPdf">Genera PDF</button>
          <button type="button" class="primary" id="preparaEmail">Prepara email</button>
        </div>
        <p class="small" id="nomeFile"></p>
      </div>
    </section>
  </main>

  <div id="printArea"></div>
  <div id="toast"></div>

  <script>
    const state = {
      attivita: [],
      partecipanti: []
    };

    const $ = (id) => document.getElementById(id);

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.style.display = "block";
      window.setTimeout(() => {
        el.style.display = "none";
      }, 2600);
    }

    function value(id) {
      return ($(id).value || "").trim();
    }

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(inputValue) {
      if (!inputValue) return "";
      const parts = inputValue.split("-");
      if (parts.length !== 3) return inputValue;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function cleanFilePart(text, fallback) {
      const cleaned = String(text || fallback)
        .trim()
        .replace(/[<>:"/\\|?*]+/g, "-")
        .replace(/\s+/g, "_");
      return cleaned || fallback;
    }

    function fileName() {
      const today = new Date().toISOString().slice(0, 10);
      const specialist = cleanFilePart(value("istruttore"), "Application_Specialist");
      const project = cleanFilePart(value("project"), "Project");
      return `${specialist}_${project}_${today}.pdf`;
    }

    function subject() {
      const specialist = value("istruttore") || "Application Specialist non indicato";
      const serial = value("serial") || "Serial Number non indicato";
      return `Rapporto Formazione Philips - ${specialist} - SN ${serial}`;
    }

    function refreshTables() {
      $("attivitaBody").innerHTML = state.attivita.map((row) => `
        <tr>
          <td>${esc(row.tipo)}</td>
          <td>${esc(row.inizio)}</td>
          <td>${esc(row.fine)}</td>
        </tr>
      `).join("");

      $("partecipantiBody").innerHTML = state.partecipanti.map((row) => `
        <tr>
          <td>${esc(row.nome)}</td>
          <td>${esc(row.qualifica)}</td>
          <td>${esc(row.data)}</td>
        </tr>
      `).join("");

      $("nomeFile").textContent = `Nome PDF: ${fileName()}`;
    }

    // FUNZIONE CANVAS UNIVERSALE CORRETTA CON COORDINATE RELATIVE E TRATTO FLUIDO
    function setupCanvas(id) {
      const canvas = $(id);
      const ctx = canvas.getContext("2d");
      let drawing = false;

      function initCanvas() {
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return false;

        const ratio = window.devicePixelRatio || 1;
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        ctx.scale(ratio, ratio);
        
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
        return true;
      }

      function getCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = 0;
        let clientY = 0;
        
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        
        return {
          x: clientX - rect.left,
          y: clientY - rect.top
        };
      }

      function startDraw(e) {
        if (e.cancelable) e.preventDefault();
        drawing = true;
        const coord = getCoordinates(e);
        ctx.beginPath();
        ctx.moveTo(coord.x, coord.y);
      }

      function moveDraw(e) {
        if (!drawing) return;
        if (e.cancelable) e.preventDefault();
        const coord = getCoordinates(e);
        ctx.lineTo(coord.x, coord.y);
        ctx.stroke();
      }

      function stopDraw() {
        drawing = false;
      }

      // Eventi Mouse (PC)
      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", moveDraw);
      window.addEventListener("mouseup", stopDraw);

      // Eventi Touch (Mobile)
      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", moveDraw, { passive: false });
      window.addEventListener("touchend", stopDraw);

      canvas.reInit = initCanvas;
      initCanvas();
    }

    // CAMBIO SCHEDA CON RIGENERAZIONE REALE DEI CANVAS AD OGNI ACCESSO
    function setActiveTab(tabId) {
      const target = $(tabId);
      if (!target) return;

      document.querySelectorAll("nav button").forEach((button) => {
        const isActive = button.dataset.tab === tabId;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
      });

      document.querySelectorAll("main section").forEach((section) => {
        section.classList.toggle("active", section.id === tabId);
      });

      // Se l'utente apre la scheda firme, forza il disegno del rettangolo con le dimensioni reali correnti
      if (tabId === "firme") {
        window.setTimeout(() => {
          if ($("firmaIstruttore").reInit) $("firmaIstruttore").reInit();
          if ($("firmaCliente").reInit) $("firmaCliente").reInit();
        }, 50);
      }
    }

    document.querySelector("nav").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-tab]");
      if (!button) return;
      setActiveTab(button.dataset.tab);
    });

    $("addAttivita").addEventListener("click", () => {
      const data = formatDate(value("dataAttivita"));
      if (!data) {
        toast("Seleziona la data dell'attivita.");
        return;
      }
      state.attivita.push({
        tipo: value("tipoAttivita"),
        inizio: `${data} ${value("oraInizio")}`,
        fine: `${data} ${value("oraFine")}`
      });
      $("dataAttivita").value = "";
      refreshTables();
    });

    $("clearAttivita").addEventListener("click", () => {
      state.attivita = [];
      refreshTables();
    });

    $("addPartecipante").addEventListener("click", () => {
      const nome = value("nomePartecipante").toUpperCase();
      if (!nome) {
        toast("Inserisci il nome del partecipante.");
        return;
      }
      state.partecipanti.push({
        nome,
        qualifica: value("qualifica"),
        data: formatDate(value("dataPartecipante"))
      });
      $("nomePartecipante").value = "";
      $("qualifica").value = "";
      $("dataPartecipante").value = "";
      refreshTables();
    });

    $("clearPartecipanti").addEventListener("click", () => {
      state.partecipanti = [];
      refreshTables();
    });

    document.querySelectorAll("[data-clear]").forEach((button) => {
      button.addEventListener("click", () => {
        const canvas = $(button.dataset.clear);
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
      });
    });

    function signatureImage(id) {
      return $(id).toDataURL("image/png");
    }

    function buildPrint() {
      const checks = [
        [$("chk1").checked, "Consegnato Programma di Formazione"],
        [$("chk2").checked, "Illustrata la documentazione d'Uso del sistema"],
        [$("chk3").checked, "Eseguita formazione specifica alle tematiche di Sicurezza"]
      ];

      $("printArea").innerHTML = `
        <div class="print-title">PHILIPS</div>
        <div class="print-heading">RAPPORTO INTERVENTO / FORMAZIONE APPLICATIVA</div>
        <div class="print-grid">
          <div class="print-cell"><div class="print-label">CLIENTE / REPARTO</div>${esc(value("cliente"))}</div>
          <div class="print-cell"><div class="print-label">PROJECT N.</div>${esc(value("project"))}</div>
          <div class="print-cell"><div class="print-label">SISTEMA / MODELLO</div>${esc(value("sistema"))}</div>
          <div class="print-cell"><div class="print-label">TECH ID / SERIAL NUMBER</div>${esc(value("serial"))}</div>
        </div>

        <div class="print-heading">DETTAGLI ATTIVITA DI TRAINING GIORNALIERE</div>
        <table class="print-table">
          <thead><tr><th>Descrizione Attivita</th><th>Data/Ora Inizio</th><th>Data/Ora Fine</th></tr></thead>
          <tbody>${state.attivita.map((row) => `<tr><td>${esc(row.tipo)}</td><td>${esc(row.inizio)}</td><td>${esc(row.fine)}</td></tr>`).join("")}</tbody>
        </table>

        <div class="print-heading">NOTE / DESCRIZIONE DELLE ATTIVITA</div>
        <div class="print-cell" style="border:1px solid #000; min-height:70px">${esc(value("note")).replace(/\n/g, "<br>")}</div>

        <div style="margin-top:10px">${checks.map(([ok, text]) => `<div>[${ok ? "X" : " "}] ${esc(text)}</div>`).join("")}</div>

        <div class="print-heading">ELENCO PARTECIPANTI E SOTTOSCRIZIONE</div>
        <table class="print-table">
          <thead><tr><th>NOME COGNOME</th><th>QUALIFICA</th><th>DATA</th></tr></thead>
          <tbody>${state.partecipanti.map((row) => `<tr><td>${esc(row.nome)}</td><td>${esc(row.qualifica)}</td><td>${esc(row.data)}</td></tr>`).join("")}</tbody>
        </table>

        <div class="print-signatures">
          <div class="print-signature">
            <div class="print-label">CLINICAL APPLICATION SPECIALIST</div>
            <div>${esc(value("istruttore"))}</div>
            <img src="${signatureImage("firmaIstruttore")}" alt="">
          </div>
          <div class="print-signature">
            <div class="print-label">FIRMA PER ACCETTAZIONE CLIENTE</div>
            <div>${esc(value("respCliente"))}</div>
            <img src="${signatureImage("firmaCliente")}" alt="">
          </div>
        </div>
      `;
    }

    $("generaPdf").addEventListener("click", () => {
      $("nomeFile").textContent = `Nome PDF: ${fileName()}`;
      buildPrint();
      window.print();
    });

    $("preparaEmail").addEventListener("click", () => {
      const body = "Buongiorno,%0D%0A%0D%0Ain allegato si trasmette il Rapporto di Formazione in formato PDF.%0D%0A%0D%0ACordiali saluti.";
      const url = `mailto:${encodeURIComponent(value("mailA"))}?subject=${encodeURIComponent(subject())}&body=${body}`;
      window.location.href = url;
    });

    ["istruttore", "project"].forEach((id) => {
      $(id).addEventListener("input", refreshTables);
    });

    // Inizializzazione controllata e ritardata all'avvio
    window.addEventListener("DOMContentLoaded", () => {
      setupCanvas("firmaIstruttore");
      setupCanvas("firmaCliente");
      refreshTables();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
