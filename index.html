<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modulo Philips APP - Diagnostica Firme</title>
  <style>dd
    :root {
      --blue: #0b5ede;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #f4f7fb;
      --white: #ffffff;
      --ok: #087443;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--soft); color:var(--ink); }
    header { padding:12px 14px; background:var(--white); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
    .brand{display:flex;justify-content:space-between;align-items:center}
    main{max-width:980px;margin:14px auto;padding:14px}
    .panel{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    label{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:5px;text-transform:uppercase}
    input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:var(--white);font:inherit}
    canvas{width:100%;height:150px;border:1px solid var(--line);border-radius:8px;background:#fff;touch-action:none}
    .signature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .diag { font-family: monospace; font-size:12px; background:#071127; color:#dfefff; padding:8px; border-radius:8px; max-height:150px; overflow:auto; white-space:pre-wrap; }
    .diag-header { font-weight:700; margin-bottom:6px; color:#9fd6ff }
    .diag-small { font-size:11px; color:#bcd9ff; margin-top:6px }
    .diag-container { display:flex; gap:12px; align-items:flex-start; margin-top:8px; }
    button { cursor:pointer; padding:8px 10px; border-radius:6px; border:1px solid var(--line); background:var(--white); font-weight:700; }
    .danger-button { color:var(--danger); }
    .actions { display:flex; gap:8px; margin-top:8px }
    @media (max-width:720px) { .grid, .signature-grid { grid-template-columns:1fr } }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <strong style="color:var(--blue)">PHILIPS</strong>
      <span style="color:var(--muted)">Rapporto formazione applicativa — Diagnostica firme</span>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Sezione di test firme</h2>
      <div class="grid">
        <div>
          <label for="istruttore">Application Specialist</label>
          <input id="istruttore">
        </div>
        <div>
          <label for="respCliente">Resp. Cliente</label>
          <input id="respCliente">
        </div>
      </div>

      <div class="signature-grid" style="margin-top:12px">
        <div>
          <label>Firma Specialist / Instructor</label>
          <canvas id="firmaIstruttore"></canvas>
          <div class="actions">
            <button data-clear="firmaIstruttore" class="danger-button">Cancella</button>
            <button id="saveIstruttore">Apri immagine</button>
          </div>
        </div>
        <div>
          <label>Firma accettazione cliente</label>
          <canvas id="firmaCliente"></canvas>
          <div class="actions">
            <button data-clear="firmaCliente" class="danger-button">Cancella</button>
            <button id="saveCliente">Apri immagine</button>
          </div>
        </div>
      </div>

      <div style="margin-top:12px">
        <div class="diag-header">Pannello diagnostico firme (aggiornamento live)</div>
        <div class="diag-container">
          <div style="flex:1">
            <div id="diag-main" class="diag">Inizializzazione diagnostica...</div>
            <div class="diag-small">I messaggi live appaiono qui quando interagisci con i canvas.</div>
          </div>
          <div style="width:220px">
            <div style="background:#f6fbff;border:1px solid #cfe7ff;padding:8px;border-radius:8px">
              <div style="font-weight:700;color:#0066cc;margin-bottom:6px">Stato sintetico</div>
              <div id="diag-summary" style="font-family:monospace;font-size:13px;color:#072143">Caricamento...</div>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

<script>
/* ----------------- UTILITÀ ----------------- */
const $ = id => document.getElementById(id);
function logDiag(msg) {
  console.log("[DIAG]", msg);
  const el = $("diag-main");
  const now = new Date().toLocaleTimeString();
  el.textContent = now + "  " + msg + "\\n" + el.textContent;
  // keep summary short
  const summary = $("diag-summary");
  summary.textContent = (now + " " + msg).split("\\n")[0];
}

/* ----------------- CHECK INIZIALE ----------------- */
(function initialChecks() {
  const ua = navigator.userAgent;
  const supportsPointer = !!window.PointerEvent;
  const supportsTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints>0);
  const dpr = window.devicePixelRatio || 1;
  const text = [
    "User Agent: " + ua,
    "PointerEvent supported: " + supportsPointer,
    "Touch supported: " + supportsTouch,
    "devicePixelRatio: " + dpr
  ].join("\\n");
  $("diag-main").textContent = text + "\\n\\n" + $("diag-main").textContent;
  $("diag-summary").textContent = "PointerEvent: " + supportsPointer + " | Touch: " + supportsTouch;
  logDiag("Check iniziale effettuata: PointerEvent=" + supportsPointer + ", Touch=" + supportsTouch + ", dpr=" + dpr);
})();

/* ----------------- SETUP CANVAS (Pointer events + diagnosi live) ----------------- */
function setupCanvasWithDiag(id) {
  const canvas = $(id);
  if (!canvas) {
    logDiag("setupCanvas: canvas non trovato: " + id);
    return;
  }
  const ctx = canvas.getContext('2d');
  if (!ctx) {
    logDiag("setupCanvas: context 2d non disponibile per " + id);
    return;
  }

  let drawing = false;
  let lastX = 0, lastY = 0;
  let initialized = false;

  function init() {
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) {
      logDiag(id + " init: dimensioni 0, skip init");
      return;
    }
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * ratio);
    canvas.height = Math.round(rect.height * ratio);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, rect.width, rect.height);
    initialized = true;
    logDiag(id + " init: css " + Math.round(rect.width) + "x" + Math.round(rect.height) + " px (" + canvas.width + "x" + canvas.height + " raw)");
  }

  function coordsFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] && e.touches[0].clientX);
    const clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] && e.touches[0].clientY);
    return { x: clientX - rect.left, y: clientY - rect.top, rect };
  }

  function handleDown(e) {
    if (!initialized) init();
    drawing = true;
    const p = coordsFromEvent(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    const elTop = document.elementFromPoint(p.rect.left + p.x, p.rect.top + p.y);
    logDiag(id + " pointerdown: type=" + (e.pointerType||e.type) + " buttons=" + (e.buttons||0) + " at " + Math.round(lastX)+","+Math.round(lastY) + " topEl=" + (elTop ? elTop.tagName + (elTop.id?("#"+elTop.id):"") : "none"));
    if (e.cancelable) e.preventDefault();
  }

  function handleMove(e) {
    if (!drawing) return;
    const p = coordsFromEvent(e);
    const midX = (lastX + p.x) / 2;
    const midY = (lastY + p.y) / 2;
    ctx.quadraticCurveTo(lastX, lastY, midX, midY);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
    // log occasional moves (throttled)
    if (!canvas._moveThrottle) {
      canvas._moveThrottle = true;
      setTimeout(() => { canvas._moveThrottle = false; }, 80);
      logDiag(id + " pointermove at " + Math.round(lastX)+","+Math.round(lastY));
    }
    if (e.cancelable) e.preventDefault();
  }

  function handleUp(e) {
    if (!drawing) return;
    drawing = false;
    ctx.closePath();
    logDiag(id + " pointerup: type=" + (e.pointerType||e.type) + " buttons=" + (e.buttons||0));
    if (e.cancelable) e.preventDefault();
  }

  // pointer events preferiti
  if (window.PointerEvent) {
    canvas.addEventListener('pointerdown', handleDown, { passive:false });
    canvas.addEventListener('pointermove', handleMove, { passive:false });
    window.addEventListener('pointerup', handleUp, { passive:false });
    window.addEventListener('pointercancel', handleUp, { passive:false });
    logDiag(id + " listener pointer registered");
  } else {
    // fallback mouse
    canvas.addEventListener('mousedown', handleDown, { passive:false });
    canvas.addEventListener('mousemove', handleMove, { passive:false });
    window.addEventListener('mouseup', handleUp, { passive:false });
    // fallback touch
    canvas.addEventListener('touchstart', handleDown, { passive:false });
    canvas.addEventListener('touchmove', handleMove, { passive:false });
    canvas.addEventListener('touchend', handleUp, { passive:false });
    logDiag(id + " pointer NOT available, registered mouse/touch fallback");
  }

  // expose utility
  canvas.clearSignature = function() {
    const r = canvas.getBoundingClientRect();
    ctx.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, r.width, r.height);
    ctx.beginPath();
    logDiag(id + " cleared");
  };
  canvas.getDataURL = function() {
    return canvas.toDataURL("image/png");
  };

  // force init if needed externally
  canvas.forceInit = init;

  // run init now if visible
  setTimeout(() => {
    try { init(); } catch(e){ logDiag(id + " init error: " + e.message); }
    // also show what element sits above canvas center
    const rect = canvas.getBoundingClientRect();
    const topEl = document.elementFromPoint(rect.left + rect.width/2, rect.top + rect.height/2);
    logDiag(id + " top element at center: " + (topEl ? topEl.tagName + (topEl.id?("#"+topEl.id):"") : "none"));
  }, 60);
}

/* ----------------- INIZIALIZZAZIONE ----------------- */
setupCanvasWithDiag("firmaIstruttore");
setupCanvasWithDiag("firmaCliente");

/* ----------------- PULSANTI CANCELLA E SALVA ----------------- */
document.querySelectorAll('[data-clear]').forEach(btn => {
  btn.addEventListener('click', () => {
    const canvas = $(btn.dataset.clear);
    if (canvas && canvas.clearSignature) canvas.clearSignature();
    else if (canvas) { const ctx = canvas.getContext('2d'); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height); }
  });
});
$("saveIstruttore").addEventListener('click', () => {
  const img = $("firmaIstruttore").getDataURL();
  window.open(img, "_blank");
});
$("saveCliente").addEventListener('click', () => {
  const img = $("firmaCliente").getDataURL();
  window.open(img, "_blank");
});

/* ----------------- GLOBAL ERROR HANDLING PER DIAGNOSI ----------------- */
window.addEventListener('error', function(ev) {
  const msg = "JS Error: " + ev.message + " @ " + ev.filename + ":" + ev.lineno + ":" + ev.colno;
  logDiag(msg);
});
window.addEventListener('unhandledrejection', function(ev) {
  const reason = ev.reason && ev.reason.message ? ev.reason.message : JSON.stringify(ev.reason);
  logDiag("UnhandledPromiseRejection: " + reason);
});

/* ----------------- UTILITY DI TEST RAPIDO (dopo caricamento) ----------------- */
setTimeout(() => {
  try {
    ["firmaIstruttore","firmaCliente"].forEach(id => {
      const c = $(id);
      if (!c) { logDiag("canvas mancante: " + id); return; }
      logDiag(id + " DOM size: " + Math.round(c.getBoundingClientRect().width) + "x" + Math.round(c.getBoundingClientRect().height) + ", raw: " + c.width + "x" + c.height);
      const ctx = c.getContext('2d');
      logDiag(id + " has 2D context: " + !!ctx);
    });
  } catch(e) { logDiag("errore test rapido: " + e.message); }
}, 300);

/* ----------------- ISTRUZIONI BREVI (nel pannello diagnostico) ----------------- */
logDiag("Istruzioni: vai su tab 'Firme' e prova a firmare. Osserva i messaggi live. Se non ricevi eventi, copia i messaggi [DIAG] dalla console e incollali qui.");
</script>
</body>
</html>
